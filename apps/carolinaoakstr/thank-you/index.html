<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thank You | Carolina Oaks Dental Care Travelers Rest</title>
    <meta
      name="description"
      content="Thank you for contacting Carolina Oaks Dental Care Travelers Rest. We have received your message."
    />
    <meta name="robots" content="noindex, follow" />
    <link
      rel="icon"
      href="../wp-content/uploads/2022/03/cropped-favicon-32x32.png"
      sizes="32x32"
    />
    <style>
      :root {
        --primary: #30b3bf;
        --primary-dark: #2698a3;
        --gold: #e8bf3a;
        --text: #2f3a35;
        --muted: #63706a;
        --background: #f7faf8;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Open Sans",
          Arial,
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(232, 191, 58, 0.18), transparent 32rem),
          var(--background);
      }

      .page {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 32px 20px;
      }

      .card {
        width: min(100%, 680px);
        padding: clamp(32px, 7vw, 64px);
        text-align: center;
        background: var(--white);
        border-radius: 24px;
        border: 1px solid rgba(48, 179, 191, 0.14);
        box-shadow: 0 24px 70px rgba(47, 58, 53, 0.12);
      }

      .logo {
        width: min(280px, 78%);
        height: auto;
        margin-bottom: 36px;
      }

      h1 {
        margin: 0 0 18px;
        color: var(--primary);
        font-size: clamp(36px, 7vw, 58px);
        line-height: 1.08;
      }

      p {
        margin: 0 auto;
        max-width: 520px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .button {
        display: inline-block;
        margin-top: 34px;
        padding: 15px 28px;
        color: var(--white);
        background: var(--primary);
        border-radius: 999px;
        font-weight: 700;
        text-decoration: none;
        transition:
          background-color 0.2s ease,
          transform 0.2s ease;
      }

      .button:hover,
      .button:focus {
        background: var(--primary-dark);
        transform: translateY(-1px);
      }

      .accent {
        width: 72px;
        height: 4px;
        margin: 26px auto;
        background: var(--gold);
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card" aria-labelledby="thank-you-heading">
        <img
          class="logo"
          src="../wp-content/uploads/2017/01/CO-TR.png"
          alt="Carolina Oaks Dental Care Travelers Rest"
        />
        <h1 id="thank-you-heading">Thank you!</h1>
        <div class="accent" aria-hidden="true"></div>
        <p>
          Your message has been received. A member of our team will
          contact you soon to help with the next steps.
        </p>
        <a class="button" href="../">Return to Home</a>
      </section>
    </main>
  </body>
</html>
